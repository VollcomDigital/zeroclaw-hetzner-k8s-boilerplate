name: hybrid-ai-agent-stack-local

# Profiles (opt-in — always pass at least one):
#   core      GPU-free smoke: Traefik, Alloy, Postgres, n8n, MCP bridge, Qdrant, 1Password Connect
#   windows   Full local stack on Windows (adds vLLM + OpenClaw / NemoClaw / OpenWork)
#   mac       Full local stack on Apple Silicon (adds Ollama + agents)
#
# Default dev remains: make dev-windows  (--profile windows)  or  make dev-mac  (--profile mac).
#
# All `${VAR}` uses below include `:-` defaults aligned with `.env.local.example` so
# `docker compose -f docker-compose.local.yml` works without `--env-file` (IDE tasks).

x-local-runtime: &local_runtime
  restart: unless-stopped
  user: "${APP_UID:-1000}:${APP_GID:-1000}"
  pids_limit: 256
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=256m
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  alloy:
    <<: *local_runtime
    user: "0:0"
    profiles:
      - core
      - windows
      - mac
    image: grafana/alloy:v1.8.2
    command:
      - run
      - --stability.level=experimental
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    expose:
      - "4317"
      - "4318"
      - "12345"
    volumes:
      - ./infrastructure/observability/alloy.local.alloy:/etc/alloy/config.alloy:ro
    networks:
      - app-tier
      - ai-tier

  traefik:
    <<: *local_runtime
    user: "0:0"
    profiles:
      - core
      - windows
      - mac
    image: traefik:v3.6.1
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.local.yml:/etc/traefik/traefik.yml:ro
      - ./infrastructure/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy-tier
      - app-tier

  # coollabsio/openclaw nginx proxies /browser/ → http://browser:3000/ (see /app/scripts/entrypoint.sh). Stub until a real browser sidecar image is wired.
  browser:
    <<: *local_runtime
    profiles:
      - windows
      - mac
    image: python:3.12-alpine
    command:
      - python
      - -m
      - http.server
      - "3000"
      - --bind
      - "0.0.0.0"
      - --directory
      - /tmp
    expose:
      - "3000"
    networks:
      - app-tier
      - ai-tier

  openwork:
    <<: *local_runtime
    profiles:
      - windows
      - mac
    image: python:3.12-alpine
    command:
      - python
      - -m
      - http.server
      - "${OPENWORK_PORT:-3000}"
      - --bind
      - "0.0.0.0"
      - --directory
      - /workspace/frontend/openwork
    environment:
      PORT: "${OPENWORK_PORT:-3000}"
      OPENCLAW_BASE_URL: http://openclaw:${OPENCLAW_PORT:-18789}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_SERVICE_NAME: openwork
      TZ: ${TZ:-UTC}
    expose:
      - "${OPENWORK_PORT:-3000}"
    depends_on:
      - openclaw
    volumes:
      - ./frontend/openwork:/workspace/frontend/openwork:rw
    networks:
      - proxy-tier
      - app-tier
    labels:
      - traefik.enable=true
      - traefik.docker.network=hybrid_local_proxy_tier
      - 'traefik.http.routers.openwork.rule=Host(`${OPENWORK_HOST:-openwork.localhost}`)'
      - traefik.http.routers.openwork.entrypoints=web
      - traefik.http.routers.openwork.middlewares=local-security-headers@file
      - traefik.http.services.openwork.loadbalancer.server.port=${OPENWORK_PORT:-3000}

  openclaw:
    <<: *local_runtime
    # Image entrypoint mutates root-owned paths under /home/linuxbrew; APP_UID 1000 breaks cleanup.
    user: "0:0"
    # Anchor cap_drop: ALL blocks unlink/chown in entrypoint even as UID 0.
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - CHOWN
    profiles:
      - windows
      - mac
    image: ${OPENCLAW_IMAGE:-coollabsio/openclaw:latest}
    entrypoint: ["/bin/sh", "/etc/openclaw/entrypoint-docker.sh"]
    environment:
      # coollabsio/openclaw configure.js: local LLM via OpenAI-compatible base (adds /v1). Not LOCAL_LLM_*.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://vllm:8000}
      OPENCLAW_PRIMARY_MODEL: ${OPENCLAW_PRIMARY_MODEL:-ollama/Qwen/Qwen2.5-Coder-7B-Instruct}
      # Control UI + WS: https://docs.openclaw.ai/web/control-ui — LAN bind so Traefik reaches gateway
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_CUSTOM_CONFIG: /app/config/openclaw.json
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      # Empty = no nginx basic auth (recommended locally). Set AUTH_PASSWORD in .env.local to enable it.
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-gateway-token}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://vllm:8000/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      MCP_N8N_URL: http://mcp-server-n8n:8000/mcp
      NEMOCLAW_BASE_URL: http://nemoclaw:8080
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-dev-qdrant-api-key}
      OTEL_SERVICE_NAME: openclaw
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      TZ: ${TZ:-UTC}
      # Nginx edge port (image entrypoint); keeps image HEALTHCHECK and Traefik backend aligned.
      PORT: "8080"
    expose:
      - "8080"
      - "${OPENCLAW_PORT:-18789}"
    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:${OPENCLAW_PORT:-18789}"
    # Image HEALTHCHECK hits :8080/healthz; first boot can exceed it → "unhealthy". Traefik v3 excludes
    # unhealthy containers from the Docker provider, so no Host() router and you get 404 on :80.
    healthcheck:
      disable: true
    depends_on:
      - browser
      - nemoclaw
      - mcp-server-n8n
      - qdrant
    volumes:
      - ./infrastructure/openclaw/entrypoint-docker.sh:/etc/openclaw/entrypoint-docker.sh:ro
      - ./infrastructure/openclaw/gateway.local.json:/app/config/openclaw.json:ro
      - ./backend/openclaw:/workspace/backend/openclaw:rw
      - openclaw-data:/data
    networks:
      - proxy-tier
      - app-tier
      - ai-tier
    labels:
      - traefik.enable=true
      - traefik.docker.network=hybrid_local_proxy_tier
      - 'traefik.http.routers.openclaw.rule=Host(`${OPENCLAW_HOST:-openclaw.localhost}`)'
      - traefik.http.routers.openclaw.entrypoints=web
      - traefik.http.routers.openclaw.middlewares=local-security-headers@file
      - traefik.http.services.openclaw.loadbalancer.passHostHeader=true
      - traefik.http.services.openclaw.loadbalancer.server.port=8080

  nemoclaw:
    <<: *local_runtime
    profiles:
      - windows
      - mac
    image: ${NEMOCLAW_IMAGE:-ghcr.io/nvidia/openshell-community/sandboxes/openclaw:latest}
    # Default CMD exits immediately; keep container up (shell loop avoids bad-arch /usr/bin/sleep on some setups).
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do sleep 86400; done"]
    environment:
      OPENSHELL_SANDBOX_ROOT: /sandbox
      OTEL_SERVICE_NAME: nemoclaw
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      TZ: ${TZ:-UTC}
    expose:
      - "8080"
    volumes:
      - ./backend/nemoclaw:/workspace/backend/nemoclaw:rw
      - nemoclaw-data:/sandbox
    networks:
      - app-tier
      - ai-tier

  vllm:
    <<: *local_runtime
    # Anchor UID 1000 has no /etc/passwd entry in this image; PyTorch getuser() crashes. Run as root + match HF_HOME.
    user: "0:0"
    profiles:
      - windows
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_SERVICE_NAME: vllm
      TZ: ${TZ:-UTC}
    expose:
      - "8000"
    shm_size: "8gb"
    volumes:
      - vllm-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    networks:
      - ai-tier

  ollama:
    <<: *local_runtime
    profiles:
      - mac
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    platform: linux/arm64
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_SERVICE_NAME: ollama
      TZ: ${TZ:-UTC}
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-tier

  1password-connect-api:
    <<: *local_runtime
    profiles:
      - core
      - windows
      - mac
    image: 1password/connect-api:latest
    environment:
      OP_HTTP_PORT: "8080"
      OP_LOG_LEVEL: info
      OP_SESSION: /home/opuser/.op/1password-credentials.json
      TZ: ${TZ:-UTC}
    expose:
      - "8080"
    volumes:
      - ${OP_CONNECT_CREDENTIALS_FILE:-./secrets/1password-credentials.json}:/home/opuser/.op/1password-credentials.json:ro
      - op-connect-data:/home/opuser/.op/data
    networks:
      - app-tier

  1password-connect-sync:
    <<: *local_runtime
    profiles:
      - core
      - windows
      - mac
    image: 1password/connect-sync:latest
    environment:
      OP_HTTP_PORT: "8080"
      OP_LOG_LEVEL: info
      OP_SESSION: /home/opuser/.op/1password-credentials.json
      TZ: ${TZ:-UTC}
    volumes:
      - ${OP_CONNECT_CREDENTIALS_FILE:-./secrets/1password-credentials.json}:/home/opuser/.op/1password-credentials.json:ro
      - op-connect-data:/home/opuser/.op/data
    depends_on:
      - 1password-connect-api
    networks:
      - app-tier

  postgres:
    <<: *local_runtime
    # Override anchor: postgres:16-alpine entrypoint expects root (gosu → postgres UID 70); UID 1000 breaks initdb on the volume.
    user: "0:0"
    # Anchor uses cap_drop: ALL; entrypoint needs chown/chmod/setuid for PGDATA + gosu.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    profiles:
      - core
      - windows
      - mac
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-postgres-password}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      TZ: ${TZ:-UTC}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-tier

  n8n:
    <<: *local_runtime
    profiles:
      - core
      - windows
      - mac
    image: n8nio/n8n:latest
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-dev-postgres-password}
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-dev-n8n-encryption-key}
      N8N_HOST: ${N8N_HOST:-n8n.localhost}
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_SERVICE_NAME: n8n
      WEBHOOK_URL: http://${N8N_HOST:-n8n.localhost}/
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:5678:5678"
    expose:
      - "5678"
    depends_on:
      - postgres
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - proxy-tier
      - app-tier
      - db-tier
    labels:
      - traefik.enable=true
      - traefik.docker.network=hybrid_local_proxy_tier
      - 'traefik.http.routers.n8n.rule=Host(`${N8N_HOST:-n8n.localhost}`)'
      - traefik.http.routers.n8n.entrypoints=web
      - traefik.http.routers.n8n.middlewares=local-security-headers@file
      - traefik.http.services.n8n.loadbalancer.server.port=5678

  mcp-server-n8n:
    <<: *local_runtime
    profiles:
      - core
      - windows
      - mac
    build:
      context: ./mcp-servers/n8n-bridge
    environment:
      BRIDGE_ACCESS_TOKEN: ${BRIDGE_ACCESS_TOKEN:-dev-mcp-bridge-token}
      BRIDGE_AUDIT_LEDGER_PATH: ${BRIDGE_AUDIT_LEDGER_PATH:-/var/lib/n8n-bridge/audit-ledger.jsonl}
      BRIDGE_MCP_POLICY_CONFIG_PATH: ${BRIDGE_MCP_POLICY_CONFIG_PATH:-${BRIDGE_POLICY_FILE_PATH:-/etc/n8n-bridge/policy.json}}
      BRIDGE_MODEL_ROUTING_CONFIG_PATH: ${BRIDGE_MODEL_ROUTING_CONFIG_PATH:-${BRIDGE_ROUTING_FILE_PATH:-/etc/n8n-bridge/model-routing.json}}
      BRIDGE_VECTOR_MEMORY_CONFIG_PATH: ${BRIDGE_VECTOR_MEMORY_CONFIG_PATH:-${BRIDGE_VECTOR_MEMORY_POLICY_FILE_PATH:-/etc/n8n-bridge/vector-memory-policy.json}}
      BRIDGE_PROGRESSIVE_ROLLOUT_CONFIG_PATH: ${BRIDGE_PROGRESSIVE_ROLLOUT_CONFIG_PATH:-${BRIDGE_ROLLOUT_FILE_PATH:-/etc/n8n-bridge/rollout.json}}
      BRIDGE_FAILURE_MODE_CONFIG_PATH: ${BRIDGE_FAILURE_MODE_CONFIG_PATH:-${BRIDGE_FAILURE_MODE_FILE_PATH:-/etc/n8n-bridge/failure-mode.json}}
      BRIDGE_CONFIDENTIAL_EXECUTION_CONFIG_PATH: ${BRIDGE_CONFIDENTIAL_EXECUTION_CONFIG_PATH:-${BRIDGE_CONFIDENTIAL_EXECUTION_FILE_PATH:-/etc/n8n-bridge/confidential-execution.json}}
      BRIDGE_AGENT_CONTROL_PLANE_CONFIG_PATH: ${BRIDGE_AGENT_CONTROL_PLANE_CONFIG_PATH:-${BRIDGE_AGENT_CONTROL_PLANE_FILE_PATH:-/etc/n8n-bridge/agent-control-plane.json}}
      BRIDGE_COMPLIANCE_PLATFORM_CONFIG_PATH: ${BRIDGE_COMPLIANCE_PLATFORM_CONFIG_PATH:-${BRIDGE_COMPLIANCE_PLATFORM_FILE_PATH:-/etc/n8n-bridge/compliance-platform.json}}
      BRIDGE_AUTONOMOUS_OPTIMIZATION_CONFIG_PATH: ${BRIDGE_AUTONOMOUS_OPTIMIZATION_CONFIG_PATH:-${BRIDGE_AUTONOMOUS_OPTIMIZATION_FILE_PATH:-/etc/n8n-bridge/autonomous-optimization.json}}
      BRIDGE_SOVEREIGNTY_CONFIG_PATH: ${BRIDGE_SOVEREIGNTY_CONFIG_PATH:-${BRIDGE_SOVEREIGNTY_FILE_PATH:-/etc/n8n-bridge/sovereignty.json}}
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      N8N_BASE_URL: http://n8n:5678
      OP_CONNECT_URL: http://1password-connect-api:8080
      OP_CONNECT_TOKEN: ${OP_CONNECT_TOKEN:-dev-connect-token}
      OTEL_SERVICE_NAME: mcp-server-n8n
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      TZ: ${TZ:-UTC}
    expose:
      - "8000"
    volumes:
      - ./mcp-servers/n8n-bridge/src:/app/src:rw
      - ./mcp-servers/n8n-bridge/tests:/app/tests:rw
      - mcp-audit-data:/var/lib/n8n-bridge
      - ./infrastructure/policy/mcp-policy.local.json:/etc/n8n-bridge/policy.json:ro
      - ./infrastructure/policy/model-routing.local.json:/etc/n8n-bridge/model-routing.json:ro
      - ./infrastructure/policy/vector-memory.local.json:/etc/n8n-bridge/vector-memory-policy.json:ro
      - ./infrastructure/policy/rollout.local.json:/etc/n8n-bridge/rollout.json:ro
      - ./infrastructure/policy/failure-mode.local.json:/etc/n8n-bridge/failure-mode.json:ro
      - ./infrastructure/policy/confidential-execution.local.json:/etc/n8n-bridge/confidential-execution.json:ro
      - ./infrastructure/policy/agent-control-plane.local.json:/etc/n8n-bridge/agent-control-plane.json:ro
      - ./infrastructure/policy/compliance-platform.local.json:/etc/n8n-bridge/compliance-platform.json:ro
      - ./infrastructure/policy/autonomous-optimization.local.json:/etc/n8n-bridge/autonomous-optimization.json:ro
      - ./infrastructure/policy/sovereignty.local.json:/etc/n8n-bridge/sovereignty.json:ro
    depends_on:
      - n8n
      - 1password-connect-api
    networks:
      - app-tier

  qdrant:
    <<: *local_runtime
    user: "0:0"
    profiles:
      - core
      - windows
      - mac
    image: qdrant/qdrant:latest
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-dev-qdrant-api-key}
      TZ: ${TZ:-UTC}
    expose:
      - "6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - ai-tier

volumes:
  op-connect-data:
  openclaw-data:
  nemoclaw-data:
  n8n-data:
  postgres-data:
  qdrant-data:
  vllm-cache:
  ollama-data:
  mcp-audit-data:

networks:
  proxy-tier:
    name: hybrid_local_proxy_tier
    internal: false
  app-tier:
    name: hybrid_local_app_tier
    internal: true
  db-tier:
    name: hybrid_local_db_tier
    internal: true
  ai-tier:
    name: hybrid_local_ai_tier
    internal: true
