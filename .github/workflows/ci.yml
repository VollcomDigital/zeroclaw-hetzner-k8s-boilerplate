name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement ./mcp-servers/n8n-bridge/requirements-dev.lock
          python -m pip install --no-deps -e ./mcp-servers/n8n-bridge

      - name: Run repository test suite
        run: python -m pytest tests mcp-servers/n8n-bridge/tests -q

      - name: Compile MCP bridge module
        run: python -m py_compile mcp-servers/n8n-bridge/src/n8n_bridge/server.py

      - name: Validate production compose configuration
        run: make validate-prod

      - name: Validate local mac compose configuration
        run: make validate-local-mac

      - name: Validate local windows compose configuration
        run: make validate-local-windows

      - name: Validate local core (no GPU / agents) compose configuration
        run: make validate-local-core

  integration-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        scenario: [toolchain, idempotency]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement ./mcp-servers/n8n-bridge/requirements-dev.lock
          python -m pip install --no-deps -e ./mcp-servers/n8n-bridge

      - name: Run integration matrix scenario
        env:
          INTEGRATION_SCENARIO: ${{ matrix.scenario }}
        run: python -m pytest mcp-servers/n8n-bridge/tests/test_integration_matrix.py -q
